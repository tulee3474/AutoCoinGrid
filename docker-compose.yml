# 로컬 개발용 — MySQL 포함
# 사용: docker compose up --build

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: autocoin
      MYSQL_USER: autocoin
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://autocoin:password@mysql:3306/autocoin}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-prod}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-dev-32char-enckey-change!!}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-danim0504!}
      PORT: "3001"
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"
    command: sh -c "npx prisma db push && node dist/index.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
